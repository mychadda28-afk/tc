name: Telegram Number Checker

on:
  workflow_dispatch:
    inputs:
      batch_start:
        description: 'Start index'
        required: true
        default: '0'
      batch_size:
        description: 'How many numbers'
        required: true
        default: '100'
      workers:
        description: 'Parallel workers'
        required: true
        default: '5'

jobs:
  check-numbers:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - run: pip install selenium webdriver-manager
    
    - env:
        BATCH_START: ${{ github.event.inputs.batch_start }}
        BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        WORKERS: ${{ github.event.inputs.workers }}
      run: python telegram_web_github.py
    
    - uses: actions/upload-artifact@v3
      with:
        name: results-${{ github.event.inputs.batch_start }}
        path: |
          has_telegram.txt
          no_telegram.txt
          check_errors.txt
          web_check_summary.json
