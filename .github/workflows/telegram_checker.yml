name: Telegram Number Checker

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      batch_start:
        description: 'Start index (0 for beginning)'
        required: true
        default: '0'
      batch_size:
        description: 'How many numbers to check'
        required: true
        default: '1000'
      workers:
        description: 'Parallel workers (1-50, recommended 20-30)'
        required: true
        default: '25'

jobs:
  check-numbers:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Install dependencies
      run: |
        pip install selenium webdriver-manager
    
    - name: Download numbers file
      run: |
        # If numbers file is in repo, skip this
        # Otherwise download from somewhere
        echo "Numbers file should be in repo"
    
    - name: Run checker
      env:
        BATCH_START: ${{ github.event.inputs.batch_start }}
        BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        WORKERS: ${{ github.event.inputs.workers }}
      run: |
        python telegram_web_github.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: results-${{ github.event.inputs.batch_start }}
        path: |
          has_telegram.txt
          no_telegram.txt
          check_errors.txt
          web_check_summary.json
        retention-days: 30
    
    - name: Commit results to repo (optional)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add has_telegram.txt no_telegram.txt check_errors.txt web_check_summary.json || true
        git commit -m "Results: batch ${{ github.event.inputs.batch_start }}" || true
        git push || true
